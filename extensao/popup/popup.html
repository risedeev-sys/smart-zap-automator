<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      min-height: 200px;
      font-family: 'Segoe UI', sans-serif;
      background: #0a0e17;
      color: #e2e8f0;
      padding: 24px;
      border: 1px solid rgba(59,130,246,0.15);
    }
    .logo { text-align: center; margin-bottom: 16px; }
    .logo h1 { font-size: 20px; color: #3b82f6; margin-bottom: 4px; }
    .logo p { font-size: 12px; color: #64748b; }
    .form-group { margin-bottom: 12px; }
    label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 4px; }
    input {
      width: 100%; padding: 10px 12px;
      border: 1px solid #1e3a5f; border-radius: 8px;
      background: #111827; color: #e2e8f0;
      font-size: 14px; outline: none;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
    }
    input:focus { border-color: #3b82f6; box-shadow: inset 0 1px 3px rgba(0,0,0,0.3), 0 0 0 2px rgba(59,130,246,0.15); }
    .btn {
      width: 100%; padding: 10px; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 4px;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .btn-primary { background: #2563eb; color: #ffffff; }
    .btn-primary:hover { background: #3b82f6; box-shadow: 0 0 12px rgba(59,130,246,0.35); }
    .btn-danger { background: #ea4335; color: white; margin-top: 8px; }
    .status { text-align: center; font-size: 12px; margin-top: 8px; min-height: 16px; }
    .status.error { color: #ea4335; }
    .status.success { color: #3b82f6; }
    .logged-in { text-align: center; }
    .logged-in .user-email { font-size: 14px; color: #60a5fa; margin-bottom: 4px; }
    .logged-in .user-info { font-size: 12px; color: #64748b; margin-bottom: 16px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="logo">
    <h1>⚡ Rise Zap</h1>
    <p>Automação WhatsApp</p>
  </div>

  <div id="login-view">
    <div class="form-group">
      <label>E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com">
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>
    <button class="btn btn-primary" id="btn-login">Entrar</button>
    <div class="status" id="status"></div>
  </div>

  <div id="logged-view" class="logged-in hidden">
    <p class="user-email" id="user-email"></p>
    <p class="user-info">Conectado ao Rise Zap</p>
    <button class="btn btn-danger" id="btn-logout">Sair</button>
    <div class="status" id="status2"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
